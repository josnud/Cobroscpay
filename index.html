<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Préstamos - Credipay</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --primary-color: #0ea5e9;
      --primary-hover: #0284c7;
      --bg-color: #f0fdfa;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #cbd5e1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      width: 100%;
      max-width: 500px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      margin-top: 20px;
    }

    .card-header {
      background: var(--primary-color);
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 1.25rem;
      font-weight: 600;
    }

    .card-body {
      padding: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-main);
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      font-size: 1rem;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background-color: #f8fafc;
      color: var(--text-main);
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
    }

    input:disabled {
      background-color: #e2e8f0;
      cursor: not-allowed;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      background-color: var(--primary-color);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.1s;
      margin-top: 10px;
    }

    button:hover {
      background-color: var(--primary-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background-color: #f1f5f9;
      color: var(--text-main);
      border: 1px solid var(--border-color);
      padding: 10px;
      margin-top: 0;
      width: auto;
      white-space: nowrap;
    }

    .btn-secondary:hover {
      background-color: #e2e8f0;
    }

    .result-box {
      margin-top: 20px;
      background-color: #f8fafc;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px;
    }

    .result-box p {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .result-box p:last-child {
      margin-bottom: 0;
    }

    .result-box span {
      font-weight: 600;
      color: var(--primary-color);
    }

    .payment-plan {
      margin-top: 24px;
    }

    .payment-plan h3 {
      margin-bottom: 12px;
      font-size: 1.1rem;
      color: var(--text-main);
      border-bottom: 2px solid var(--primary-color);
      padding-bottom: 8px;
      display: inline-block;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      font-size: 0.875rem;
    }

    th, td {
      border-bottom: 1px solid var(--border-color);
      padding: 12px 8px;
      text-align: right;
    }

    th {
      background-color: #f1f5f9;
      color: var(--text-muted);
      font-weight: 600;
      text-align: right;
    }

    th:first-child, td:first-child {
      text-align: center;
    }

    .btn-pdf {
      background-color: #10b981;
    }

    .btn-pdf:hover {
      background-color: #059669;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header">
      Calculadora de Préstamos - Credipay
    </div>
    <div class="card-body">
      <form id="loanForm">
        <div class="form-group">
          <label for="amount">Monto Solicitado (C$):</label>
          <input type="number" id="amount" placeholder="Ej: 5000" required>
        </div>

        <div class="form-group">
          <label for="rate">Interés Mensual (%):</label>
          <div class="input-row">
            <input type="number" id="rate" value="15" disabled required>
            <button type="button" class="btn-secondary" onclick="enableRateInput()">Editar</button>
          </div>
        </div>

        <div class="form-group">
          <label for="term">Plazo (en meses):</label>
          <input type="number" id="term" placeholder="Ej: 3" required>
        </div>

        <div class="form-group">
          <label for="frequency">Frecuencia de Pago:</label>
          <select id="frequency" required>
            <option value="semanal">Semanal</option>
            <option value="quincenal">Quincenal</option>
            <option value="mensual">Mensual</option>
          </select>
        </div>

        <div class="form-group">
          <label for="expenses">Gastos Varios:</label>
          <select id="expenses">
            <option value="0">Ninguno (C$ 0)</option>
            <option value="100">SVD (C$ 100)</option>
          </select>
        </div>

        <div class="input-row">
          <button type="button" onclick="calculateLoan()">Calcular</button>
          <button type="button" class="btn-secondary" onclick="generatePaymentPlan()">Plan de Pagos</button>
        </div>
      </form>

      <div class="result-box" id="result" style="display: none;">
        <p>Total de Cuotas (Semanas): <span id="totalWeeks"></span></p>
        <p>Monto de Gastos Varios: <span id="miscExpenses"></span></p>
        <p>Total General a Pagar: <span id="totalPayment"></span></p>
        <hr style="margin: 10px 0; border: 0; border-top: 1px solid #cbd5e1;">
        <p>Cuota Semanal: <span id="weeklyPayment"></span></p>
        <p>Cuota Quincenal: <span id="biweeklyPayment"></span></p>
        <p>Cuota Mensual: <span id="monthlyPayment"></span></p>
      </div>

      <div class="payment-plan" id="paymentPlanContainer" style="display: none;">
        <div id="paymentPlanExport">
          <h3>Plan de Pagos</h3>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Fecha</th>
                  <th>Saldo Total</th>
                  <th>Cuota</th>
                  <th>Saldo Final</th>
                </tr>
              </thead>
              <tbody id="paymentTable"></tbody>
            </table>
          </div>
        </div>
        <button type="button" class="btn-pdf" onclick="downloadPDF()">Descargar PDF</button>
      </div>
    </div>
  </div>

  <script>
    // Permite modificar el interés
    function enableRateInput() {
      const rateInput = document.getElementById("rate");
      rateInput.disabled = false;
      rateInput.focus();
    }

    // Calcula el préstamo y muestra los resultados resumen
    function calculateLoan() {
      const amount = parseFloat(document.getElementById("amount").value);
      const rate = parseFloat(document.getElementById("rate").value);
      const term = parseFloat(document.getElementById("term").value);
      const expenses = parseFloat(document.getElementById("expenses").value) || 0;

      if (isNaN(amount) || isNaN(rate) || isNaN(term) || amount <= 0 || rate <= 0 || term <= 0) {
        alert("Por favor, ingresá valores válidos para el monto, interés y plazo.");
        return;
      }

      const totalWeeks = Math.ceil(term * 4);
      const totalInterestPercent = rate * term;
      const totalInterest = (amount * totalInterestPercent) / 100;
      
      // Se suman los gastos varios al total
      const totalPayment = amount + totalInterest + expenses;

      const weeklyPayment = totalPayment / totalWeeks;
      const biweeklyPayment = weeklyPayment * 2;
      const monthlyPayment = weeklyPayment * 4;

      document.getElementById("totalWeeks").textContent = totalWeeks;
      document.getElementById("miscExpenses").textContent = `C$ ${expenses.toFixed(2)}`;
      document.getElementById("totalPayment").textContent = `C$ ${totalPayment.toFixed(2)}`;
      document.getElementById("weeklyPayment").textContent = `C$ ${weeklyPayment.toFixed(2)}`;
      document.getElementById("biweeklyPayment").textContent = `C$ ${biweeklyPayment.toFixed(2)}`;
      document.getElementById("monthlyPayment").textContent = `C$ ${monthlyPayment.toFixed(2)}`;

      document.getElementById("result").style.display = "block";
    }

    // Genera el plan de pagos y actualiza la tabla
    function generatePaymentPlan() {
      const amount = parseFloat(document.getElementById("amount").value);
      const rate = parseFloat(document.getElementById("rate").value);
      const term = parseFloat(document.getElementById("term").value);
      const frequency = document.getElementById("frequency").value;
      const expenses = parseFloat(document.getElementById("expenses").value) || 0;

      if (isNaN(amount) || isNaN(rate) || isNaN(term) || amount <= 0 || rate <= 0 || term <= 0) {
        alert("Por favor, ingresá valores válidos antes de generar el plan.");
        return;
      }

      const totalInterestPercent = rate * term;
      const totalInterest = (amount * totalInterestPercent) / 100;
      
      // Se suman los gastos varios a la deuda total
      const totalPayment = amount + totalInterest + expenses;

      let paymentCount;
      let paymentInterval;

      switch (frequency) {
        case "semanal":
          paymentCount = Math.ceil(term * 4);
          paymentInterval = 7;
          break;
        case "quincenal":
          paymentCount = Math.ceil(term * 2);
          paymentInterval = 14;
          break;
        case "mensual":
          paymentCount = Math.ceil(term);
          paymentInterval = 30;
          break;
      }

      // La cuota ya incluye el prorrateo de los gastos varios
      const paymentAmount = totalPayment / paymentCount;
      const tbody = document.getElementById("paymentTable");
      tbody.innerHTML = "";

      let remainingBalance = totalPayment;
      let currentDate = new Date();

      for (let i = 1; i <= paymentCount; i++) {
        // Para evitar decimales infinitos que descuadren el último centavo
        let currentPayment = paymentAmount;
        if (i === paymentCount) {
           currentPayment = remainingBalance; 
        }
        
        let saldoFinal = remainingBalance - currentPayment;
        if (saldoFinal < 0.01) saldoFinal = 0; // Corrección de precisión

        currentDate.setDate(currentDate.getDate() + paymentInterval);

        // Formateando fecha a DD/MM/YYYY local
        const dateStr = currentDate.toLocaleDateString('es-NI');

        tbody.innerHTML += `
          <tr>
            <td>${i}</td>
            <td>${dateStr}</td>
            <td>C$ ${remainingBalance.toFixed(2)}</td>
            <td>C$ ${currentPayment.toFixed(2)}</td>
            <td>C$ ${saldoFinal.toFixed(2)}</td>
          </tr>
        `;

        remainingBalance = saldoFinal;
      }

      document.getElementById("paymentPlanContainer").style.display = "block";
    }

    // Genera el PDF capturando el contenedor del plan de pagos
    function downloadPDF() {
      const elementToCapture = document.getElementById("paymentPlanExport");
      
      html2canvas(elementToCapture, { scale: 2 }).then(canvas => {
        const imgData = canvas.toDataURL("image/png");
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pdfWidth = pdf.internal.pageSize.getWidth();
        
        // Agregar un pequeño margen
        const margin = 10; 
        const printWidth = pdfWidth - (margin * 2);

        const imgProps = pdf.getImageProperties(imgData);
        const imgHeight = (imgProps.height * printWidth) / imgProps.width;

        // Se dibuja la imagen en el PDF respetando el margen
        pdf.addImage(imgData, "PNG", margin, margin, printWidth, imgHeight);
        pdf.save("Plan_de_Pagos_Credipay.pdf");
      });
    }
  </script>
</body>
</html>
